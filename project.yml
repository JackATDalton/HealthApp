name: Vitalia
options:
  bundleIdPrefix: com.jackdalton
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

settings:
  base:
    PRODUCT_NAME: Vitalia
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Vitalia:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vitalia
        excludes:
          - "**/*.md"
    resources:
      - path: Vitalia/Assets.xcassets
    info:
      path: Vitalia/Info.plist
      properties:
        CFBundleDisplayName: Vitalia
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHealthShareUsageDescription: "Vitalia reads your Apple Watch and Health data to compute your recovery and longevity scores."
        NSHealthUpdateUsageDescription: "Vitalia does not write health data."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
    entitlements:
      path: Vitalia/Vitalia.entitlements
      properties:
        com.apple.developer.healthkit: true
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.jackdalton.Vitalia"
        com.apple.security.application-groups:
          - group.com.jackdalton.Vitalia
    dependencies:
      - target: VitaliaWidget
        embed: true
        codeSign: true
    settings:
      base:
        INFOPLIST_FILE: Vitalia/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jackdalton.Vitalia
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  VitaliaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VitaliaWidget
    info:
      path: VitaliaWidget/Info.plist
      properties:
        CFBundleDisplayName: Vitalia
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: VitaliaWidget/VitaliaWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jackdalton.Vitalia
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_NAME: VitaliaWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.jackdalton.Vitalia.VitaliaWidget
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        APPLICATION_EXTENSION_API_ONLY: YES

  VitaliaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VitaliaTests
    dependencies:
      - target: Vitalia

  VitaliaUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VitaliaUITests
    dependencies:
      - target: Vitalia
